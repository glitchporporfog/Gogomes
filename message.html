<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gogomes</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        :root {
            --bg-main: #e7ebf0;
            --bg-panel: #ffffff;
            --bg-chat: #f4f4f5;
            --text-main: #000000;
            --text-muted: #707579;
            --tg-blue: #2481cc;
            --border-color: #dfdfdf;
            --msg-in: #ffffff;
            --msg-out: #eeffde;
            --input-bg: #ffffff;
            --menu-hover: #f4f4f5;
        }

        .theme-dark {
            --bg-main: #181818;
            --bg-panel: #212121;
            --bg-chat: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --tg-blue: #5288c1;
            --border-color: #303030;
            --msg-in: #2b2b2b;
            --msg-out: #3d6a97;
            --input-bg: #212121;
            --menu-hover: #2c2c2c;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            max-width: 440px;
            width: 100%;
            height: 100vh;
            max-height: 800px;
            background: var(--bg-panel);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            position: relative;
        }

        @media (max-width: 440px) {
            .phone { max-height: 100vh; border-radius: 0; }
        }

        @media (min-width: 441px) {
            .phone { border-radius: 12px; border: 1px solid var(--border-color); }
        }

        .screen {
            flex: 1;
            padding: 36px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--bg-panel);
        }

        .tg-logo { font-size: 56px; text-align: center; margin-bottom: 16px; }
        h2 { text-align: center; font-size: 22px; font-weight: 500; margin-bottom: 12px; }
        .info { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 24px; line-height: 1.4; }

        input, select {
            width: 100%; padding: 12px 16px; border-radius: 10px; font-size: 16px; margin-bottom: 16px;
            border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); outline: none;
        }

        .code-inputs { display: flex; gap: 8px; justify-content: center; margin: 24px 0; }
        .code-digit { 
            width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: bold; 
            border-radius: 8px; margin-bottom: 0; padding: 0; line-height: 50px;
            font-family: Arial, sans-serif !important;
        }

        button {
            width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer;
            background: var(--tg-blue); color: white; border: none; outline: none; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .header {
            height: 56px; padding: 0 16px; display: flex; align-items: center; gap: 16px;
            background: var(--bg-panel); border-bottom: 1px solid var(--border-color); font-size: 18px; font-weight: 500;
        }
        .header-title { flex: 1; display: flex; align-items: center; gap: 6px; }
        .icon-btn { background: none; border: none; color: var(--tg-blue); font-size: 20px; cursor: pointer; padding: 4px; }

        .avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 500; font-size: 16px; background: #5288c1; color: white; overflow: hidden; background-size: cover; background-position: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .tabs { display: flex; background: var(--bg-panel); border-bottom: 1px solid var(--border-color); }
        .tab { flex: 1; text-align: center; padding: 14px 0; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--tg-blue); border-bottom-color: var(--tg-blue); }

        .item-list { flex: 1; overflow-y: auto; background: var(--bg-panel); }
        .contact-item { display: flex; align-items: center; padding: 10px 16px; gap: 14px; cursor: pointer; }
        .contact-item:hover { background: var(--menu-hover); }
        .contact-info { flex: 1; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; flex-direction: column; justify-content: center; height: 52px; }
        .contact-name { font-weight: 500; font-size: 16px; color: var(--text-main); display: flex; align-items: center; gap: 4px; }
        .contact-status { font-size: 13px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-chat); }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .message.in { align-self: flex-start; background: var(--msg-in); color: var(--text-main); border-top-left-radius: 4px; }
        .message.out { align-self: flex-end; background: var(--msg-out); color: var(--text-main); border-top-right-radius: 4px; }
        .msg-time { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 3px; float: right; margin-left: 8px; }

        .chat-media { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }
        audio { margin-top: 4px; max-width: 100%; }

        .input-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-panel); border-top: 1px solid var(--border-color); }
        .input-row input { margin-bottom: 0; border-radius: 20px; padding: 10px 16px; background: var(--bg-chat); border: none; }
        .input-row button { width: 40px; height: 40px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

        .recording { background: #ff3b30 !important; color: white !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .side-menu {
            position: absolute; top: 0; left: -290px; width: 290px; height: 100%; z-index: 2000;
            background: var(--bg-panel); transition: left 0.25s ease; display: flex; flex-direction: column; border-right: 1px solid var(--border-color);
        }
        .side-menu.open { left: 0; }
        .menu-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1999; display: none; }
        .menu-overlay.show { display: block; }
        .menu-header { padding: 24px 16px; background: var(--tg-blue); color: white; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { padding: 14px 20px; display: flex; align-items: center; gap: 20px; cursor: pointer; font-size: 15px; color: var(--text-main); }
        .menu-item:hover { background: var(--menu-hover); }

        .modal { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center; z-index: 3000; padding: 16px; }
        .modal-content { background: var(--bg-panel); padding: 20px; border-radius: 12px; width: 100%; max-width: 320px; }
        .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
        .modal-buttons button { width: auto; padding: 8px 16px; background: none; color: var(--tg-blue); text-transform: none; }
        .modal-buttons button.btn-confirm { background: var(--tg-blue); color: white; border-radius: 6px; }

        .blue-badge { color: #2481cc; font-size: 15px; }
        .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    </style>
</head>
<body class="theme-light">

<div class="phone">
    <div class="screen" id="authScreen">
        <div class="tg-logo">💬</div>
        <h2>Вход в GOGOMES</h2>
        <div class="info">Введите ваш Email для получения проверочного кода.</div>
        <input type="email" id="emailInput" placeholder="Ваш Email">
        <button id="sendBtn">Получить код</button>
        
        <div id="usernameBlock" style="display:none; margin-top:16px;">
            <input type="text" id="usernameInput" placeholder="Ваш никнейм">
            <button id="saveUsernameBtn">Зарегистрироваться</button>
        </div>
    </div>

    <div class="screen" id="codeScreen" style="display:none;">
        <div class="tg-logo">📩</div>
        <h2>Проверка кода</h2>
        <div class="info">Мы отправили одноразовый код на ваш адрес.</div>
        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-digit" id="c1" autocomplete="off">
            <input type="text" maxlength="1" class="code-digit" id="c2" autocomplete="off">
            <input type="text" maxlength="1" class="code-digit" id="c3" autocomplete="off">
            <input type="text" maxlength="1" class="code-digit" id="c4" autocomplete="off">
            <input type="text" maxlength="1" class="code-digit" id="c5" autocomplete="off">
            <input type="text" maxlength="1" class="code-digit" id="c6" autocomplete="off">
        </div>
        <button id="verifyCodeBtn">Подтвердить</button>
        <button id="resendBtn" style="margin-top:10px; background:none; color:var(--tg-blue); text-transform:none;">Отправить повторно</button>
        <div id="timer" style="text-align:center; font-size:13px; margin-top:8px; color:var(--text-muted);"></div>
    </div>

    <div id="mainApp" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <button id="menuToggleBtn" class="icon-btn" style="color:var(--text-main);">☰</button>
            <div class="header-title">Gogomes</div>
            <button id="addContactBtn" class="icon-btn">➕</button>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="chats">Чаты</div>
            <div class="tab" data-tab="contacts">Контакты</div>
        </div>

        <div id="chatsPanel" class="item-list"></div>
        <div id="contactsPanel" class="item-list" style="display:none;"></div>
        
        <div id="chatPanel" style="display:none; flex-direction:column; height:100%; position:absolute; top:0; left:0; width:100%; background:var(--bg-panel); z-index:1000;">
            <div class="header">
                <button id="backBtn" class="icon-btn">←</button>
                <div class="avatar" id="chatAvatar"></div>
                <div class="header-title" style="flex-direction:column; align-items:flex-start;">
                    <span id="chatName" style="font-size:16px; font-weight:500;"></span>
                    <span id="chatStatus" style="font-size:12px; color:var(--text-muted); font-weight:normal;"></span>
                </div>
            </div>
            <div id="chatMessages" class="messages"></div>
            <div class="input-row">
                <button id="mediaBtn" class="icon-btn">📎</button>
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="voiceBtn" class="icon-btn">🎙️</button>
                <button id="sendMsgBtn">🚀</button>
            </div>
        </div>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="avatar" id="menuAvatar" style="background:#fff; color:var(--tg-blue); width:48px; height:48px;"></div>
            <div style="font-weight:600; margin-top:8px; display:flex; align-items:center; gap:4px;" id="menuUsername"></div>
            <div style="font-size:13px; opacity:0.8;" id="menuEmail"></div>
        </div>
        <div class="menu-item" id="menuProfileBtn">👤 Мой профиль</div>
        <div class="menu-item" id="menuLogoutBtn" style="color:#ff3b30;">🚪 Выйти</div>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">Ваше имя:</p>
            <input type="text" id="profileName">
            <p style="font-size:12px; color:var(--text-muted);">О себе:</p>
            <input type="text" id="profileStatus">
            <p style="font-size:12px; color:var(--text-muted);">Ссылка на аватарку (URL):</p>
            <input type="text" id="profileImgUrl" placeholder="https://site.com/image.jpg">
            <div class="modal-buttons">
                <button id="closeProfileModal">Отмена</button>
                <button id="saveProfileBtn" class="btn-confirm">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="mediaModal" class="modal">
        <div class="modal-content">
            <h3>Отправить медиафайл</h3>
            <input type="text" id="mediaUrlInput" placeholder="Вставьте URL картинки или видео">
            <select id="mediaTypeSelect">
                <option value="image">📸 Изображение</option>
                <option value="video">🎥 Видео</option>
            </select>
            <div class="modal-buttons">
                <button id="closeMediaModal">Отмена</button>
                <button id="sendMediaBtn" class="btn-confirm">Отправить</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Добавить друга</h3>
            <input type="email" id="contactEmail" placeholder="Email друга">
            <div class="modal-buttons">
                <button id="closeAddModal">Отмена</button>
                <button id="saveContactBtn" class="btn-confirm">Найти и добавить</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    emailjs.init('4uOFTOS_2LI6B0G90');

    const firebaseConfig = {
        apiKey: "AIzaSyCsrYasB4cIq3SZErxs3_",
        authDomain: "gogomes-f7c3a.firebaseapp.com",
        projectId: "gogomes-f7c3a",
        storageBucket: "gogomes-f7c3a.firebasestorage.app",
        messagingSenderId: "720525109842",
        appId: "1:720525109842:web:db7361456db6b840e63de8",
        measurementId: "G-ZEF9XGD2P6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = null;
    let pendingEmail = null;
    let timerInterval = null;
    let timeLeft = 0;
    let mediaRecorder = null;
    let audioChunks = [];
    window.currentChatId = null;

    function checkBadge(email) {
        return email === 'lo9629219@gmail.com' ? '<span class="blue-badge">🔵</span>' : '';
    }

    function renderAvatar(user, element) {
        if (user.photoUrl && user.photoUrl.trim() !== '') {
            element.innerHTML = `<img src="${user.photoUrl}">`;
        } else {
            element.innerHTML = (user.username || '?').charAt(0).toUpperCase();
            element.style.backgroundImage = 'none';
        }
    }

    function generateCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }

    async function sendCode(email) {
        let code = generateCode();
        pendingEmail = email;
        sessionStorage.setItem(`code_${email}`, code);
        
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('codeScreen').style.display = 'flex';
        
        timeLeft = 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft > 0 ? `Повторный код через ${timeLeft}с` : '';
            document.getElementById('resendBtn').disabled = timeLeft > 0;
        }, 1000);

        emailjs.send('service_zdhh3x9', 'template_kh9p60r', { email, code }).catch(e => console.error(e));
        alert(`Код отправлен: ${code}`);
    }

    document.getElementById('sendBtn').onclick = () => {
        let em = document.getElementById('emailInput').value.trim().toLowerCase();
        if(!em.includes('@')) return alert('Введите валидный Email');
        sendCode(em);
    };

    document.getElementById('verifyCodeBtn').onclick = async () => {
        let code = '';
        for(let i=1;i<=6;i++) code += document.getElementById(`c${i}`).value;
        if(code !== sessionStorage.getItem(`code_${pendingEmail}`)) return alert('Неверный код!');

        clearInterval(timerInterval);
        document.getElementById('codeScreen').style.display = 'none';

        // ИЩЕМ НАПРЯМУЮ ПО ID ДОКУМЕНТА (КОТОРЫЙ ТЕПЕРЬ EMAIL)
        const userDocRef = doc(db, "users", pendingEmail);
        const userSnap = await getDoc(userDocRef);

        if(userSnap.exists()) {
            currentUser = userSnap.data();
            localStorage.setItem('gogo_user', JSON.stringify(currentUser));
            loadApp();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('emailInput').disabled = true;
            document.getElementById('usernameBlock').style.display = 'block';
        }
    };

    document.getElementById('saveUsernameBtn').onclick = async () => {
        let name = document.getElementById('usernameInput').value.trim();
        if(name.length < 2) return alert('Имя слишком короткое');
        
        // СВЯЗЫВАЕМ: ID ДОКУМЕНТА В FIREBASE = EMAIL ПОЛЬЗОВАТЕЛЯ
        currentUser = { id: pendingEmail, email: pendingEmail, username: name, status: 'Всем привет!', photoUrl: '' };
        await setDoc(doc(db, "users", pendingEmail), currentUser);
        localStorage.setItem('gogo_user', JSON.stringify(currentUser));
        loadApp();
    };

    for(let i=1;i<=6;i++) {
        let currentInput = document.getElementById(`c${i}`);
        currentInput.oninput = () => { if(currentInput.value && i < 6) document.getElementById(`c${i+1}`).focus(); };
        currentInput.onkeydown = (e) => { if(e.key === 'Backspace' && !currentInput.value && i > 1) document.getElementById(`c${i-1}`).focus(); };
    }

    function loadApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        updateMenuUI();

        onSnapshot(collection(db, "users", currentUser.id, "contacts"), () => { syncLists(); });
        onSnapshot(query(collection(db, "messages"), where("chatters", "array-contains", currentUser.id)), () => { syncLists(); });
    }

    function updateMenuUI() {
        document.getElementById('menuUsername').innerHTML = escape(currentUser.username) + ' ' + checkBadge(currentUser.email);
        document.getElementById('menuEmail').innerText = currentUser.email;
        renderAvatar(currentUser, document.getElementById('menuAvatar'));
    }

    function syncLists() {
        let chatPanel = document.getElementById('chatsPanel');
        let contPanel = document.getElementById('contactsPanel');
        
        onSnapshot(collection(db, "users", currentUser.id, "contacts"), (snap) => {
            if(snap.empty) {
                chatPanel.innerHTML = '<div class="empty">У вас нет диалогов</div>';
                contPanel.innerHTML = '<div class="empty">Список контактов пуст</div>';
                return;
            }

            chatPanel.innerHTML = '';
            contPanel.innerHTML = '';

            snap.forEach((cDoc) => {
                let contact = cDoc.data();
                
                // Слушаем изменения профиля друга в реальном времени напрямую из Firebase
                onSnapshot(doc(db, "users", contact.id), (userSnap) => {
                    if(!userSnap.exists()) return;
                    let actualData = userSnap.data();

                    // Отрисовка в Контактах
                    let existingCont = document.getElementById(`c-item-${actualData.id}`);
                    if(existingCont) existingCont.remove();

                    let cDiv = document.createElement('div');
                    cDiv.id = `c-item-${actualData.id}`;
                    cDiv.className = 'contact-item';
                    cDiv.innerHTML = `<div class="avatar" id="c-av-${actualData.id}"></div><div class="contact-info"><div class="contact-name">${escape(actualData.username)} ${checkBadge(actualData.email)}</div><div class="contact-status">${escape(actualData.status)}</div></div>`;
                    cDiv.onclick = () => openChat(actualData.id);
                    contPanel.appendChild(cDiv);
                    renderAvatar(actualData, document.getElementById(`c-av-${actualData.id}`));

                    // Отрисовка в Чатах (если есть сообщения)
                    let cid = [currentUser.id, actualData.id].sort().join("_");
                    onSnapshot(query(collection(db, "messages"), where("chatId", "==", cid), orderBy("timestamp", "desc")), (mSnap) => {
                        let existingChat = document.getElementById(`ch-item-${actualData.id}`);
                        if(existingChat) existingChat.remove();

                        if(!mSnap.empty) {
                            let lm = mSnap.docs[0].data();
                            let lastTxt = lm.text;
                            if(lm.type === 'image') lastTxt = '📸 Фото';
                            if(lm.type === 'video') lastTxt = '🎥 Видео';
                            if(lm.type === 'audio') lastTxt = '🎙️ Голосовое сообщение';

                            let hDiv = document.createElement('div');
                            hDiv.id = `ch-item-${actualData.id}`;
                            hDiv.className = 'contact-item';
                            hDiv.innerHTML = `<div class="avatar" id="ch-av-${actualData.id}"></div><div class="contact-info"><div class="contact-name">${escape(actualData.username)} ${checkBadge(actualData.email)}</div><div class="contact-status">${escape(lastTxt)}</div></div>`;
                            hDiv.onclick = () => openChat(actualData.id);
                            chatPanel.appendChild(hDiv);
                            renderAvatar(actualData, document.getElementById(`ch-av-${actualData.id}`));
                        }
                    });
                });
            });
        });
    }

    let unsubChat = null;
    async function openChat(contactId) {
        window.currentChatId = contactId;
        document.getElementById('chatPanel').style.display = 'flex';
        let cid = [currentUser.id, contactId].sort().join("_");

        onSnapshot(doc(db, "users", contactId), (uDoc) => {
            if(uDoc.exists()) {
                let inf = uDoc.data();
                document.getElementById('chatName').innerHTML = escape(inf.username) + ' ' + checkBadge(inf.email);
                document.getElementById('chatStatus').innerText = inf.status;
                renderAvatar(inf, document.getElementById('chatAvatar'));
            }
        });

        if(unsubChat) unsubChat();
        unsubChat = onSnapshot(query(collection(db, "messages"), where("chatId", "==", cid), orderBy("timestamp", "asc")), (snap) => {
            let box = document.getElementById('chatMessages');
            box.innerHTML = '';
            snap.forEach(d => {
                let m = d.data();
                let dMsg = document.createElement('div');
                dMsg.className = `message ${m.sender === currentUser.id ? 'out' : 'in'}`;
                
                let htmlContent = `<div>${escape(m.text)}</div>`;
                if(m.type === 'image') htmlContent = `<img src="${m.mediaUrl}" class="chat-media">`;
                if(m.type === 'video') htmlContent = `<video src="${m.mediaUrl}" controls class="chat-media"></video>`;
                if(m.type === 'audio') htmlContent = `<audio src="${m.mediaUrl}" controls></audio>`;

                let time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                dMsg.innerHTML = `${htmlContent}<div class="msg-time">${time}</div>`;
                box.appendChild(dMsg);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendMsg(text, type='text', mediaUrl='') {
        if(!text.trim() && !mediaUrl) return;
        await addDoc(collection(db, "messages"), {
            chatId: [currentUser.id, window.currentChatId].sort().join("_"),
            chatters: [currentUser.id, window.currentChatId],
            text: text, type: type, mediaUrl: mediaUrl,
            sender: currentUser.id, receiver: window.currentChatId, timestamp: Date.now()
        });
    }

    document.getElementById('sendMsgBtn').onclick = () => {
        let i = document.getElementById('messageInput');
        sendMsg(i.value); i.value = '';
    };

    document.getElementById('mediaBtn').onclick = () => document.getElementById('mediaModal').style.display='flex';
    document.getElementById('closeMediaModal').onclick = () => document.getElementById('mediaModal').style.display='none';
    document.getElementById('sendMediaBtn').onclick = () => {
        let url = document.getElementById('mediaUrlInput').value.trim();
        let type = document.getElementById('mediaTypeSelect').value;
        if(url) sendMsg(type === 'image' ? '📸 Фото' : '🎥 Видео', type, url);
        document.getElementById('mediaUrlInput').value = '';
        document.getElementById('mediaModal').style.display = 'none';
    };

    document.getElementById('voiceBtn').onclick = async () => {
        let btn = document.getElementById('voiceBtn');
        if(!mediaRecorder) {
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    let b = new Blob(audioChunks, { type: 'audio/mp3' });
                    let r = new FileReader();
                    r.readAsDataURL(b);
                    r.onloadend = () => { sendMsg('🎙️ Голосовое сообщение', 'audio', r.result); };
                    btn.classList.remove('recording');
                    btn.innerText = '🎙️';
                    mediaRecorder = null;
                };
                mediaRecorder.start();
                btn.classList.add('recording');
                btn.innerText = '🛑';
            } catch(e) { alert('Микрофон недоступен'); }
        } else {
            mediaRecorder.stop();
        }
    };

    document.getElementById('addContactBtn').onclick = () => document.getElementById('addModal').style.display='flex';
    document.getElementById('closeAddModal').onclick = () => document.getElementById('addModal').style.display='none';
    
    // ИСПРАВЛЕННЫЙ И СВЯЗАННЫЙ ПОИСК КОНТАКТОВ В FIREBASE ПО EMAIL
    document.getElementById('saveContactBtn').onclick = async () => {
        let targetEmail = document.getElementById('contactEmail').value.trim().toLowerCase();
        if(!targetEmail) return;

        if(targetEmail === currentUser.email) return alert('Нельзя добавить самого себя.');

        // Напрямую запрашиваем документ, где ID — это Email
        const targetDocRef = doc(db, "users", targetEmail);
        const targetSnap = await getDoc(targetDocRef);
        
        if(!targetSnap.exists()) {
            return alert('Пользователь с такой почтой ещё не зарегистрирован в GOGOMES.');
        }

        let targetUserData = targetSnap.data();

        // Добавляем взаимно контакты в подколлекции Firebase
        await setDoc(doc(db, "users", currentUser.id, "contacts", targetUserData.id), targetUserData);
        await setDoc(doc(db, "users", targetUserData.id, "contacts", currentUser.id), currentUser);
        
        alert('Контакт успешно добавлен в список!');
        document.getElementById('addModal').style.display = 'none';
        document.getElementById('contactEmail').value = '';
    };

    document.getElementById('menuProfileBtn').onclick = () => {
        document.getElementById('profileName').value = currentUser.username;
        document.getElementById('profileStatus').value = currentUser.status || '';
        document.getElementById('profileImgUrl').value = currentUser.photoUrl || '';
        document.getElementById('profileModal').style.display = 'flex';
    };
    document.getElementById('closeProfileModal').onclick = () => document.getElementById('profileModal').style.display='none';
    document.getElementById('saveProfileBtn').onclick = async () => {
        currentUser.username = document.getElementById('profileName').value.trim();
        currentUser.status = document.getElementById('profileStatus').value.trim();
        currentUser.photoUrl = document.getElementById('profileImgUrl').value.trim();
        
        await setDoc(doc(db, "users", currentUser.id), currentUser);
        localStorage.setItem('gogo_user', JSON.stringify(currentUser));
        updateMenuUI();
        document.getElementById('profileModal').style.display = 'none';
    };

    document.getElementById('backBtn').onclick = () => { document.getElementById('chatPanel').style.display='none'; window.currentChatId=null; };
    document.getElementById('menuToggleBtn').onclick = () => { document.getElementById('sideMenu').classList.add('open'); document.getElementById('menuOverlay').classList.add('show'); };
    document.getElementById('menuOverlay').onclick = () => { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('show'); };
    document.getElementById('menuLogoutBtn').onclick = () => { localStorage.clear(); location.reload(); };

    document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            t.classList.add('active');
            let isChats = t.dataset.tab === 'chats';
            document.getElementById('chatsPanel').style.display = isChats ? 'block' : 'none';
            document.getElementById('contactsPanel').style.display = isChats ? 'none' : 'block';
        };
    });

    function escape(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    let saved = localStorage.getItem('gogo_user');
    if(saved) { currentUser = JSON.parse(saved); loadApp(); }
</script>
</body>
</html>
